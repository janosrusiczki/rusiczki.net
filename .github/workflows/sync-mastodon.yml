name: Sync Mastodon and rebuild microblog
on:
  schedule:
    - cron: '17 3 * * *'   # 03:17 UTC daily
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '_microblog/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Sync from Mastodon (stages media + writes entries)
        env:
          MASTODON_INSTANCE: ${{ vars.MASTODON_INSTANCE }}
          MASTODON_HANDLE:   ${{ vars.MASTODON_HANDLE }}
          MASTODON_TOKEN:    ${{ secrets.MASTODON_TOKEN }}
        run: |
          if [ -n "${MASTODON_INSTANCE}" ] && [ -n "${MASTODON_HANDLE}" ]; then
            ruby _support/scripts/sync_mastodon.rb
          else
            echo "Mastodon instance/handle not set; skipping API sync."
          fi

      - name: Build full site (base + microblog overlay)
        run: bundle exec jekyll build --config _config.yml,_config_microblog.yml

      - name: Test built site
        run: bundle exec rake test
        env:
          LANG: C.UTF-8
          LC_ALL: C.UTF-8

      - name: Deploy full site with rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --exclude=/microblog/twitter/
          path: _site/
          remote_path: ${{ secrets.DEPLOY_PATH }}
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_user: ${{ secrets.DEPLOY_USER }}
          remote_key:  ${{ secrets.DEPLOY_KEY }}

      - name: Upload staged Mastodon media to content host
        if: hashFiles('_microblog_media_staging/mastodon/**') != ''
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --chmod=D755,F644
          path: _microblog_media_staging/mastodon/
          remote_path: ${{ secrets.CONTENT_PATH }}/microblog/mastodon/
          remote_host: ${{ secrets.CONTENT_HOST }}
          remote_user: ${{ secrets.CONTENT_USER }}
          remote_key:  ${{ secrets.CONTENT_KEY }}

      - name: Commit and push new Mastodon entries
        run: |
          git config user.name  "rusiczki-bot"
          git config user.email "bot@rusiczki.net"
          if [ -n "$(git status --porcelain _microblog/mastodon)" ]; then
            git add _microblog/mastodon
            git commit -m "Sync Mastodon microblog [skip ci]"
            git push origin master
          fi
