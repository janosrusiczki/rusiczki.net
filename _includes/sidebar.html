<div class="sidebar">
  <div class="container sidebar-sticky">
    <div class="sidebar-about">
      <h1>
          <a href="{{ site.baseurl }}">
          {{ site.title }}
        </a>
      </h1>
      <p class="description">{{ site.description }}</p>
    </div>

    <nav class="sidebar-nav">
        <a class="sidebar-nav-item{% if page.url == site.baseurl %} active{% endif %}" href="{{ site.baseurl }}">Home</a>

      <a class="sidebar-nav-item{% if page.url == '/about/' %} active{% endif %}" href="/about/">About</a>
      <a class="sidebar-nav-item{% if page.url == '/archives/' %} active{% endif %}" href="/archives/">Archives</a>
      <a class="sidebar-nav-item" href="https://photos.rusiczki.net">Photos</a>
      <a class="sidebar-nav-item{% if page.url contains '/microblog' %} active{% endif %}" href="/microblog/">Microblog</a>
      <a class="sidebar-nav-item{% if page.url == '/search/' %} active{% endif %}" href="/search/">Search</a>
    </nav>

    <p class="copyright">&copy; 2002 - {{ site.time | date: '%Y' }}. All rights reserved.</p>
  </div>
</div>
